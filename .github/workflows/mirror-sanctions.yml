name: Espejo de listas de sanciones

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: mirror-sanctions
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descargar y comprimir fuentes a data/
        run: |
          set -uo pipefail
          mkdir -p data
          count=$(jq 'length' sanctions-sources.json)
          for i in $(seq 0 $((count - 1))); do
            id=$(jq -r ".[$i].lista_id" sanctions-sources.json)
            file=$(jq -r ".[$i].file" sanctions-sources.json)
            url=$(jq -r ".[$i].url" sanctions-sources.json)
            case "$url" in
              PENDIENTE*|null|"") echo "Saltando $id: url no configurada"; continue ;;
            esac
            echo "Descargando $id -> data/$file.gz"
            if curl -L --fail --silent --show-error --retry 3 --max-time 240 \
                 -A "pep-manager-mirror/1.0" -o "data/$file.tmp" "$url"; then
              if [ -s "data/$file.tmp" ]; then
                gzip -9 -nc "data/$file.tmp" > "data/$file.gz"
                rm -f "data/$file.tmp" "data/$file"
                echo "OK $id -> data/$file.gz ($(wc -c < "data/$file.gz") bytes)"
              else
                echo "::warning::$id vacío; se conserva la copia previa"; rm -f "data/$file.tmp"
              fi
            else
              echo "::warning::Falló $id ($url); se conserva la copia previa"; rm -f "data/$file.tmp"
            fi
          done

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "sanctions-mirror-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "chore: espejo de listas de sanciones ($(date -u +%F))"
            git push
          fi
